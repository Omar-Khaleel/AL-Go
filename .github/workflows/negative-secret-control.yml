name: Negative Secret Control

on:
  workflow_dispatch:

jobs:
  normal-job-no-environment:
    runs-on: ubuntu-latest
    steps:
      - name: Prove normal job cannot access environment-only secret
        env:
          ENV_ONLY_CANARY: ${{ secrets.ALGO_ENV_ONLY_CANARY_20260522 }}
          SANDBOX_AUTHCONTEXT: ${{ secrets.Sandbox_AuthContext }}
          NON_EXISTENT_SECRET: ${{ secrets.THIS_SECRET_DOES_NOT_EXIST_12345 }}
        run: |
          echo "NEGATIVE_CONTROL_NORMAL_JOB=true"

          if [ -z "$NON_EXISTENT_SECRET" ]; then
            echo "NON_EXISTENT_SECRET_PRESENT=false"
          else
            echo "NON_EXISTENT_SECRET_PRESENT=true"
          fi

          if [ -z "$ENV_ONLY_CANARY" ]; then
            echo "NORMAL_JOB_ENV_ONLY_CANARY_PRESENT=false"
          else
            echo "NORMAL_JOB_ENV_ONLY_CANARY_PRESENT=true"
            echo "NORMAL_JOB_ENV_ONLY_CANARY_LENGTH_GT_ZERO=true"
          fi

          if [ -z "$SANDBOX_AUTHCONTEXT" ]; then
            echo "NORMAL_JOB_SANDBOX_AUTHCONTEXT_PRESENT=false"
          else
            echo "NORMAL_JOB_SANDBOX_AUTHCONTEXT_PRESENT=true"
            echo "NORMAL_JOB_SANDBOX_AUTHCONTEXT_LENGTH_GT_ZERO=true"
          fi
