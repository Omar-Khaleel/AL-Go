name: Negative Secret Control

on:
  workflow_dispatch:

jobs:
  normal-job-no-environment:
    runs-on: ubuntu-latest
    steps:
      - name: Prove normal branch job cannot access Sandbox_AuthContext
        env:
          SANDBOX_AUTHCONTEXT: ${{ secrets.Sandbox_AuthContext }}
        run: |
          echo "NEGATIVE_CONTROL_NORMAL_JOB=true"
          if [ -z "$SANDBOX_AUTHCONTEXT" ]; then
            echo "NORMAL_JOB_SANDBOX_AUTHCONTEXT_PRESENT=false"
          else
            echo "NORMAL_JOB_SANDBOX_AUTHCONTEXT_PRESENT=true"
            echo "NORMAL_JOB_SANDBOX_AUTHCONTEXT_LENGTH_GT_ZERO=true"
          fi
